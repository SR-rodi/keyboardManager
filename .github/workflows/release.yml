name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    permissions:
      contents: write   # нужно для создания GitHub Release и загрузки assets

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── JDK ─────────────────────────────────────────────────────────────────
      # jpackage (используемый Compose Desktop) требует JDK 17+
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      # ─── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── Build EXE ───────────────────────────────────────────────────────────
      - name: Build EXE (Compose Desktop native distribution)
        shell: cmd
        run: gradlew.bat packageExe --no-daemon

      # ─── Locate artifact ─────────────────────────────────────────────────────
      # packageExe кладёт результат в build/compose/binaries/main/exe/
      - name: Find EXE path
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build/compose/binaries/main/exe" -Filter "*.exe" | Select-Object -First 1
          echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "EXE_NAME=$($exe.Name)"     >> $env:GITHUB_OUTPUT

      # ─── Upload artifact (хранится 90 дней, доступен в UI → Actions → Run) ──
      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager-${{ github.sha }}
          path: ${{ steps.find_exe.outputs.EXE_PATH }}
          retention-days: 90
          if-no-files-found: error

      # ─── GitHub Release ──────────────────────────────────────────────────────
      # Создаём тег вида build-<короткий SHA> и прикладываем .exe к релизу
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Build ${{ github.sha }}"
          body: |
            Автоматическая сборка из ветки `main`.

            Коммит: ${{ github.sha }}
            Запущено: ${{ github.run_id }}
          files: ${{ steps.find_exe.outputs.EXE_PATH }}
          fail_on_unmatched_files: true
